name: ci

on:
  push:
    branches: [main, 'claude/**']
  pull_request:

jobs:
  smoke:
    name: Linux typecheck + build + boot
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.11'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Boot Electron under xvfb
        run: |
          set -e
          xvfb-run -a node_modules/.bin/electron --no-sandbox --disable-gpu . > electron.log 2>&1 &
          ELECTRON_PID=$!
          sleep 12
          if ! kill -0 "$ELECTRON_PID" 2>/dev/null; then
            echo "Electron exited before timeout — boot failed"
            cat electron.log || true
            exit 1
          fi
          kill "$ELECTRON_PID" 2>/dev/null || true
          wait "$ELECTRON_PID" 2>/dev/null || true
          if grep -iE 'Uncaught|TypeError|Cannot find module|MODULE_NOT_FOUND' electron.log; then
            echo "JS errors detected in Electron boot log"
            cat electron.log
            exit 1
          fi
          echo "Electron boot smoke test passed"
